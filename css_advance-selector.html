<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Selectors</title>
    <style>
        
        ol,  p, .special{
            background-color: lightblue;
        }
        .red{
            color: red;
        }
        .bold{
            font-weight: bold;
        }
        .highlight{
            background-color: yellow;
        }
        
    </style>
</head>

<body>
    <h1>This is a heading</h1>
    <h1 class="special">This is a heading</h1>
    <p>Tis is a simple paragraph<  /p>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
        <li>Item 5</li>
    </ol>

    <ul class="red bold highlight">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
        <li>Item 5</li>
    </ul>
</body>

</html>
